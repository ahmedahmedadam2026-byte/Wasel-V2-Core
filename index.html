<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="واصل - منصة الخصوصية الرقمية الأولى في الوطن العربي. خدمات الهوية الآمنة والبريد الإلكتروني الأبدي مع حماية متقدمة">
    <meta name="keywords" content="خصوصية رقمية, بريد إلكتروني آمن, هوية رقمية, حماية البيانات, واصل">
    <meta name="author" content="Adam Ahmed">
    <meta property="og:title" content="واصل - حماية خصوصيتك الرقمية">
    <meta property="og:description" content="منصة متكاملة لحماية هويتك الرقمية وبريدك الإلكتروني">
    <meta property="og:type" content="website">
    <title>واصل - حماية خصوصيتك الرقمية</title>
    
    <style>
        /* ==================== RESET & VARIABLES ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --electric-red: #FF0000;
            --pure-black: #000000;
            --dark-gray: #0a0a0a;
            --light-gray: #1a1a1a;
            --text-white: #ffffff;
            --text-gray: #cccccc;
            --shadow-red: rgba(255, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--pure-black);
            color: var(--text-white);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ==================== CANVAS BACKGROUND ==================== */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ==================== MAIN CONTAINER ==================== */
        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
        }

        /* ==================== NAVIGATION ==================== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 0, 0, 0.2);
            transition: var(--transition);
        }

        .navbar.scrolled {
            box-shadow: 0 5px 30px var(--shadow-red);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .wasel-shield {
            width: 50px;
            height: 50px;
            position: relative;
            animation: shieldPulse 2s ease-in-out infinite;
        }

        .shield-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px var(--electric-red));
        }

        @keyframes shieldPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--electric-red) 0%, #ff4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-white);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
            transition: var(--transition);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--electric-red);
            transition: var(--transition);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--electric-red);
        }

        .mobile-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .mobile-toggle span {
            width: 25px;
            height: 3px;
            background: var(--electric-red);
            transition: var(--transition);
            border-radius: 2px;
        }

        .mobile-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .mobile-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .mobile-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* ==================== HERO SECTION ==================== */
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 2rem 4rem;
        }

        .hero-content {
            max-width: 900px;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text-white) 0%, var(--electric-red) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s ease-out;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--text-gray);
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--electric-red);
            color: var(--text-white);
            box-shadow: 0 5px 25px var(--shadow-red);
        }

        .btn-primary:hover {
            background: #cc0000;
            transform: translateY(-3px);
            box-shadow: 0 8px 35px var(--shadow-red);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-white);
            border: 2px solid var(--electric-red);
        }

        .btn-secondary:hover {
            background: var(--electric-red);
            transform: translateY(-3px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== FEATURES SECTION ==================== */
        .features-section {
            padding: 6rem 2rem;
            background: rgba(10, 10, 10, 0.5);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--electric-red);
        }

        .section-subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-gray);
            margin-bottom: 4rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .feature-card {
            background: rgba(26, 26, 26, 0.8);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 0, 0.1);
            transition: var(--transition);
            cursor: pointer;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            border-color: var(--electric-red);
            box-shadow: 0 10px 40px var(--shadow-red);
        }

        .feature-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--electric-red), #cc0000);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }

        .feature-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-white);
        }

        .feature-description {
            color: var(--text-gray);
            line-height: 1.8;
        }

        /* ==================== SERVICES SECTION ==================== */
        .services-section {
            padding: 6rem 2rem;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
            margin-top: 4rem;
        }

        .service-card {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9), rgba(10, 10, 10, 0.9));
            padding: 3rem;
            border-radius: 25px;
            border: 2px solid transparent;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--electric-red), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .service-card:hover::before {
            opacity: 0.1;
        }

        .service-card:hover {
            border-color: var(--electric-red);
            transform: scale(1.02);
        }

        .service-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .service-icon {
            width: 80px;
            height: 80px;
            background: var(--electric-red);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 5px 20px var(--shadow-red);
        }

        .service-title {
            font-size: 2rem;
            color: var(--text-white);
        }

        .service-description {
            color: var(--text-gray);
            line-height: 1.8;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .service-features {
            list-style: none;
            position: relative;
            z-index: 1;
        }

        .service-features li {
            padding: 0.8rem 0;
            color: var(--text-gray);
            position: relative;
            padding-right: 2rem;
        }

        .service-features li::before {
            content: '✓';
            position: absolute;
            right: 0;
            color: var(--electric-red);
            font-weight: bold;
        }

        /* ==================== ABOUT SECTION ==================== */
        .about-section {
            padding: 6rem 2rem;
            background: rgba(10, 10, 10, 0.5);
        }

        .about-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 3rem;
        }

        .about-text {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .about-text h3 {
            color: var(--electric-red);
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .about-text p {
            color: var(--text-gray);
            line-height: 2;
            font-size: 1.1rem;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .stat-card {
            background: rgba(26, 26, 26, 0.8);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            color: var(--electric-red);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-gray);
            font-size: 1.1rem;
        }

        .about-mission {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.1), transparent);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            margin-top: 3rem;
        }

        .about-mission h3 {
            color: var(--electric-red);
            font-size: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .about-mission p {
            color: var(--text-gray);
            line-height: 2;
            font-size: 1.1rem;
            text-align: center;
        }

        /* ==================== LEGAL SECTION ==================== */
        .legal-section {
            padding: 6rem 2rem;
            min-height: 100vh;
        }

        .legal-content {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(26, 26, 26, 0.8);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .legal-section-block {
            margin-bottom: 3rem;
        }

        .legal-section-block h3 {
            color: var(--electric-red);
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(255, 0, 0, 0.3);
        }

        .legal-section-block h4 {
            color: var(--text-white);
            font-size: 1.3rem;
            margin: 1.5rem 0 1rem;
        }

        .legal-section-block p,
        .legal-section-block li {
            color: var(--text-gray);
            line-height: 2;
            margin-bottom: 1rem;
        }

        .legal-section-block ul {
            list-style-position: inside;
            padding-right: 1.5rem;
        }

        .legal-date {
            text-align: center;
            color: var(--text-gray);
            font-style: italic;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 0, 0, 0.2);
        }

        /* ==================== FOOTER ==================== */
        .footer {
            background: rgba(10, 10, 10, 0.95);
            padding: 4rem 2rem 2rem;
            border-top: 1px solid rgba(255, 0, 0, 0.2);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .footer-section h4 {
            color: var(--electric-red);
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }

        .footer-section p,
        .footer-section a {
            color: var(--text-gray);
            line-height: 2;
            text-decoration: none;
            display: block;
            transition: var(--transition);
        }

        .footer-section a:hover {
            color: var(--electric-red);
            padding-right: 0.5rem;
        }

        .footer-bottom {
            max-width: 1400px;
            margin: 0 auto;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 0, 0, 0.1);
            text-align: center;
            color: var(--text-gray);
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-link {
            width: 40px;
            height: 40px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--electric-red);
            transition: var(--transition);
        }

        .social-link:hover {
            background: var(--electric-red);
            color: var(--text-white);
            transform: translateY(-3px);
        }

        /* ==================== PAGE TRANSITIONS ==================== */
        .page {
            display: none;
            animation: fadeIn 0.5s ease-in;
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }

        .page.active {
            display: block;
            opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ==================== LOADING ANIMATION ==================== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--pure-black);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 0, 0, 0.1);
            border-top: 4px solid var(--electric-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ==================== SCROLL TO TOP BUTTON ==================== */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            background: var(--electric-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
            z-index: 999;
            box-shadow: 0 5px 20px var(--shadow-red);
        }

        .scroll-top.visible {
            opacity: 1;
        }

        .scroll-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px var(--shadow-red);
        }

        .scroll-top::before {
            content: '↑';
            color: var(--text-white);
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* ==================== NOTIFICATION SYSTEM ==================== */
        #notificationContainer {
            position: fixed;
            top: 90px;
            left: 20px;
            z-index: 99999;
            pointer-events: none;
            direction: rtl;
        }
